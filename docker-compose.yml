version: '3.8'

services:
  mongo:
    image: mongo:6.0
    container_name: accessgate-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - accessgate-network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: accessgate-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/accessgate
      - JWT_ACCESS_SECRET=super_secret_access_key_change_me_in_production
      - JWT_REFRESH_SECRET=super_secret_refresh_key_change_me_in_production
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - CLIENT_URL=http://localhost:5173
    volumes:
      - ./server:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - mongo
    networks:
      - accessgate-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: accessgate-client
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api/v1
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - server
    networks:
      - accessgate-network

volumes:
  mongo-data:

networks:
  accessgate-network:
    driver: bridge
